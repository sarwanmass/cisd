<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - CISD India</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        .gallery-slider { height: 200px; border-radius: 4px; overflow: hidden; position: relative; cursor: pointer; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .gallery-slider:hover img { transform: scale(1.15); }
        .swiper-button-next, .swiper-button-prev { color: #fff !important; text-shadow: 0 0 5px rgba(0,0,0,0.5); transform: scale(0.6); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="static/assets/logo/logo.png" alt="CISD India Logo">
                <a href="index.html"><span>CISD India</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="programmes.html">Programmes</a></li>
                <li><a href="research.html">Research</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="join.html" class="btn btn-primary" style="color: white;">Join Us</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero" style="height: 40vh; background-image: url('static/assets/gallery/hero.png');">
            <div class="container" style="text-align: center;">
                <h1 style="margin: 0;">Gallery</h1>
                <p>Capturing Impact and Transforming Lives</p>
            </div>
        </section>

        <section class="py-5">
            <div class="container">
                <h2 class="text-center mb-4">Photo Gallery</h2>
                <div class="grid grid-3">
                    <!-- Gallery Card Template -->
                    <div class="card text-center">
                        <div class="swiper gallery-slider">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide"><img src="static/assets/gallery/cisdposter-1.png" alt="Gallery Image"></div>
                            </div>
                            <div class="swiper-button-prev"></div>
                            <div class="swiper-button-next"></div>
                        </div>
                        <h3>Training Programmes</h3>
                    </div>
                    <!-- Repeat the div.card block above for Student Activities, Workshops, etc. -->
                </div>
            </div>
        </section>
        
        <!-- ... (Keep your existing Video and Impact sections here) ... -->
    </main>

    <footer>
        <!-- (Your existing footer code) -->
    </footer>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        document.querySelectorAll('.gallery-slider').forEach(el => {
            new Swiper(el, { loop: true, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }});
        });
    </script>
    <script src="static/js/main.js"></script>
</body>
</html>
