<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CISD India</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--bg-light); }
        .login-card { background: white; padding: 3rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-card img { height: 60px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='assets/logo/logo.png') }}" alt="CISD Logo">
        <h2 style="color: var(--primary-blue); margin-bottom: 2rem;">Admin Portal</h2>
        
        <form id="loginForm">
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div id="login-alert" style="display: none; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; background-color: #FDE8E8; color: #9B1C1C;"></div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <div style="margin-top: 1rem;">
            <a href="{{ url_for('home') }}" style="color: var(--text-muted); font-size: 0.875rem;">&larr; Back to Website</a>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const alertBox = document.getElementById('login-alert');
        alertBox.style.display = 'none';
        
        const formData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };
        
        try {
            const response = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            if (response.ok) {
                window.location.href = '/admin/dashboard';
            } else {
                alertBox.style.display = 'block';
                alertBox.innerText = 'Invalid credentials. Please try again.';
            }
        } catch (error) {
            alertBox.style.display = 'block';
            alertBox.innerText = 'Network error.';
        }
    });
    </script>
</body>
</html>
